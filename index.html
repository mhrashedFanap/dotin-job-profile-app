</head>

<div class="app">
  <aside>
    <h1>اپ شناسنامه‌های استاندارد داتین</h1>
    <p>v1.2 | ویرایش محتوا + ذخیره در دیتابیس JSON</p>

    <label>جستجوی SubFamily یا Job Title</label>
    <input id="searchBox" placeholder="مثلاً HR Generalists یا سرمایه انسانی" oninput="searchProfiles()" />
    <label>انتخاب شناسنامه</label>
    <select id="profileSelect" onchange="renderSelected()"></select>
    <div class="row">
      <button class="btn" onclick="renderSelected()">نمایش</button>
      <button class="btn secondary" onclick="copyDocText()">کپی متن</button>
    </div>
    <div class="row">
      <button class="btn" onclick="openEditor()">ویرایش محتوا</button>
      <button class="btn secondary" onclick="saveDbToFile()">ذخیره فایل JSON</button>
    </div>

    <label>Import JSON Database</label>
    <input id="fileInput" type="file" accept=".json,application/json" onchange="importFile(event)" />
    <button class="btn secondary" onclick="downloadDb()">دانلود دیتابیس فعلی</button>
    <button class="btn secondary" onclick="resetSampleDb()">بازگشت به دیتابیس نمونه</button>

    <label>Paste JSON Profile / Database</label>
    <textarea id="jsonPaste" placeholder='JSON را اینجا paste کنید'></textarea>
    <button class="btn" onclick="importPastedJson()">افزودن / جایگزینی JSON</button>
    <button class="btn danger" onclick="clearLocalDb()">حذف دیتابیس ذخیره‌شده مرورگر</button>
    <div id="status" class="status"></div>

    <div class="hint">
      ساختار داده: آرایه profiles یا یک object با کلید profiles. هر profile می‌تواند type = subfamily یا jobtitle داشته باشد. دیتابیس در localStorage همین مرورگر ذخیره می‌شود.
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <button onclick="window.print()">Print / PDF</button>
      <button onclick="downloadCurrentHtml()">دانلود HTML همین شناسنامه</button>
      <button onclick="downloadCurrentJson()">دانلود JSON همین شناسنامه</button>
    </div>
    <section id="editor" class="editor"></section>
    <section id="doc" class="doc"></section>
  </main>
</div>

function loadDb(){
  try{ const saved = localStorage.getItem('dotinJobProfilesDb'); return saved ? JSON.parse(saved) : structuredClone(SAMPLE_DB); }
  catch(e){ return structuredClone(SAMPLE_DB); }
}
function saveDb(){ localStorage.setItem('dotinJobProfilesDb', JSON.stringify(db)); }
function setStatus(msg, isError=false){ const el=document.getElementById('status'); el.textContent=msg; el.className='status'+(isError?' error':''); }

  if(Array.isArray(obj)) return {version:'custom', updatedAt:new Date().toISOString().slice(0,10), profiles:obj};
  if(obj && Array.isArray(obj.profiles)) return obj;
  if(obj && (obj.type==='subfamily'||obj.type==='jobtitle')) return {version:'custom', updatedAt:new Date().toISOString().slice(0,10), profiles:[obj]};
  throw new Error('فرمت JSON معتبر نیست. باید profiles[] یا یک profile داشته باشد.');
}
function mergeProfiles(newDb){
  const map = new Map((db.profiles||[]).map(p=>[p.id || `${p.type}-${p.subFamilyEn||p.jobTitle||Math.random()}`, p]));
  (newDb.profiles||[]).forEach(p=>{ if(!p.id) p.id = `${p.type}-${p.subFamilyEn||p.jobTitle||Date.now()}`; map.set(p.id,p); });
  db = {...db, profiles:[...map.values()], updatedAt:new Date().toISOString().slice(0,10)};
  saveDb(); refreshSelect();
}
function resetSampleDb(){ db=structuredClone(SAMPLE_DB); saveDb(); refreshSelect(); setStatus('دیتابیس نمونه بارگذاری شد.'); }
function clearLocalDb(){ localStorage.removeItem('dotinJobProfilesDb'); db=structuredClone(SAMPLE_DB); refreshSelect(); setStatus('دیتابیس مرورگر حذف و نمونه پیش‌فرض نمایش داده شد.'); }
function importPastedJson(){
  try{ const obj=JSON.parse(document.getElementById('jsonPaste').value); mergeProfiles(normalizeProfiles(obj)); setStatus('JSON با موفقیت اضافه/جایگزین شد.'); }
  catch(e){ setStatus(e.message, true); }
}
function importFile(event){
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{ try{ mergeProfiles(normalizeProfiles(JSON.parse(reader.result))); setStatus('فایل دیتابیس با موفقیت بارگذاری شد.'); } catch(e){ setStatus(e.message,true); } };
  reader.readAsText(file,'utf-8');
}
function profileLabel(p){ return p.type==='subfamily' ? `جامع | ${p.subFamilyFa || ''} (${p.subFamilyEn || ''})` : `اختصاصی | ${p.jobTitle || ''} (${p.level || ''})`; }
function matches(p, q){ const s=JSON.stringify(p).toLowerCase(); return !q || s.includes(q.toLowerCase()); }
function searchProfiles(){ refreshSelect(); }

function renderSelected(){ const id=document.getElementById('profileSelect').value; currentProfile=(db.profiles||[]).find(p=>p.id===id); renderProfile(currentProfile); }
function escapeHtml(s){ return String(s ?? '').replace(/[&<>"]/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m])); }
function listHtml(items){ return `<ul>${(items||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>`; }
function tableHtml(headers, rows, cls=''){

}
function renderProfile(p){

    <div class="legend">راهنمای علائم: ✔ مالک / مجری اصلی &nbsp;&nbsp; ◐ مشارکت‌کننده &nbsp;&nbsp; — خارج از دامنه مسئولیت</div>
    ${tableHtml(['فرآیندهای اصلی', ...(proc.columns||[])], procRows)}
    <h2>4- پروفایل ارزش‌یابی شغل (Job Evaluation Profile)</h2>
    <div class="note">مقادیر این جدول به‌صورت بازه (→) نمایش داده می‌شوند. سطر اول جدول سطح شغلی داتین است. اختیار عمل شاخص داتینی است و مولفه مرسری محسوب نمی‌شود.</div>

    ${tableHtml(['مولفه ارزش‌یابی','سطح مبنا'], profRows, 'base')}
    <h2>5- شرایط احراز شغل</h2>

function copyDocText(){
  const el=document.getElementById('doc'); const range=document.createRange(); range.selectNode(el); const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  try{ document.execCommand('copy'); setStatus('محتوای شناسنامه کپی شد.'); } catch(e){ setStatus('کپی خودکار انجام نشد؛ دستی کپی کنید.', true); }

function download(filename, text, type='text/plain'){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type})); a.download=filename; a.click(); URL.revokeObjectURL(a.href); }
function downloadDb(){ download('dotin_job_profiles_db.json', JSON.stringify(db,null,2), 'application/json'); }
function downloadCurrentJson(){ if(!currentProfile) return; download((currentProfile.id||'profile')+'.json', JSON.stringify(currentProfile,null,2), 'application/json'); }

function arrToLines(arr){ return (arr||[]).join('\n'); }
function linesToArr(s){ return String(s||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean); }
function objToKvLines(obj){ return Object.entries(obj||{}).map(([k,v])=>`${k}\t${v}`).join('\n'); }
function kvLinesToObj(s){
  const out={};
  String(s||'').split(/\r?\n/).forEach(line=>{
    if(!line.trim()) return;
    const parts=line.split('\t');
    if(parts.length>=2){ const k=parts.shift().trim(); out[k]=parts.join('\t').trim(); }
    else { const idx=line.indexOf(':'); if(idx>0) out[line.slice(0,idx).trim()]=line.slice(idx+1).trim(); }
  });
  return out;
}
function matrixToTsv(matrix){
  if(!matrix) return '';
  const cols=matrix.columns||[];
  const rows=(matrix.rows||[]).map(r=>[r.process||r.factor||'', ...(r.values||[])].join('\t'));
  return ['عنوان/مولفه\t'+cols.join('\t'), ...rows].join('\n');
}
function tsvToMatrix(s, keyName){
  const lines=String(s||'').split(/\r?\n/).filter(x=>x.trim());
  if(!lines.length) return {columns:[],rows:[]};
  const head=lines[0].split('\t').map(x=>x.trim());
  const columns=head.slice(1);
  const rows=lines.slice(1).map(line=>{
    const p=line.split('\t');
    const first=(p.shift()||'').trim();
    return {[keyName]: first, values:p.map(x=>x.trim())};
  });
  return {columns,rows};
}
function rowsToTsv(rows, cols){
  return [cols.join('\t'), ...(rows||[]).map(r=>cols.map(c=>r[c]??'').join('\t'))].join('\n');
}
function tsvToRows(s, cols){
  const lines=String(s||'').split(/\r?\n/).filter(x=>x.trim());
  const start = lines.length && lines[0].split('\t')[0].trim()===cols[0] ? 1 : 0;
  return lines.slice(start).map(line=>{
    const p=line.split('\t'); const o={}; cols.forEach((c,i)=>o[c]=(p[i]||'').trim()); return o;
  });
}
function editInput(id,label,value='',wide=false){ return `<div class="${wide?'wide':''}"><label>${escapeHtml(label)}</label><input id="${id}" value="${escapeHtml(value)}"></div>`; }
function editText(id,label,value='',wide=true,code=false,hint=''){
  return `<div class="${wide?'wide':''}"><label>${escapeHtml(label)}</label>${hint?`<div class="mini">${hint}</div>`:''}<textarea id="${id}" class="${code?'code':''}">${escapeHtml(value)}</textarea></div>`;
}
function openEditor(){
  if(!currentProfile){ setStatus('ابتدا یک شناسنامه انتخاب کنید.', true); return; }
  const e=document.getElementById('editor');
  const p=currentProfile;
  let html=`<h2>ویرایش محتوای شناسنامه</h2><div class="mini">پس از ویرایش، روی «ذخیره در دیتابیس» بزنید. تغییرات در همین دیتابیس مرورگر ذخیره می‌شود و برای ثبت در فایل، «ذخیره فایل JSON» را بزنید.</div>`;
  if(p.type==='subfamily'){
    const c=p.commonComponents||{};
    html+=`<div class="grid">`+
      editInput('ed_subFamilyFa','عنوان فارسی SubFamily',p.subFamilyFa||'')+
      editInput('ed_subFamilyEn','عنوان انگلیسی SubFamily',p.subFamilyEn||'')+
      editText('ed_baseInfo','مشخصات پایه',objToKvLines(p.baseInfo),true,false,'هر ردیف: عنوان، سپس Tab، سپس مقدار')+
      editText('ed_purpose','هدف',c.purpose||'')+
      editText('ed_mission','مأموریت',c.mission||'')+
      editText('ed_keyResponsibilities','مسئولیت‌های کلیدی مشترک',arrToLines(c.keyResponsibilities),true,false,'هر مورد در یک خط')+
      editText('ed_expectedOutputs','خروجی‌های مورد انتظار',arrToLines(c.expectedOutputs),true,false,'هر مورد در یک خط')+
      editText('ed_stakeholders','ذی‌نفعان اصلی',arrToLines(c.stakeholders),true,false,'هر مورد در یک خط')+
      editText('ed_baseKnowledgeSkills','دانش و مهارت‌های پایه',arrToLines(c.baseKnowledgeSkills),true,false,'هر مورد در یک خط')+
      editText('ed_processMatrix','ماتریس فرآیندها',matrixToTsv(p.processMatrix),true,true,'فرمت TSV: ستون‌ها با Tab جدا شوند. ردیف اول عنوان ستون‌هاست.')+
      editText('ed_evaluationProfile','پروفایل ارزش‌یابی شغل',matrixToTsv(p.evaluationProfile),true,true,'فرمت TSV: مولفه و مقادیر هر شغل با Tab جدا شوند.')+
      editText('ed_careerPath','مسیر رشد شغلی',p.careerPath||'',true,false)+
      `</div>`;
  } else {
    const d=p.distinctiveComponents||{}, r=p.requirements||{};
    html+=`<div class="grid">`+
      editInput('ed_jobTitle','عنوان شغلی',p.jobTitle||'')+
      editInput('ed_level','سطح شغلی',p.level||'')+
      editText('ed_baseInfo','اطلاعات پایه',objToKvLines(p.baseInfo),true,false,'هر ردیف: عنوان، سپس Tab، سپس مقدار')+
      editText('ed_relation','ارتباط با شناسنامه جامع',p.relationToSubFamily||'')+
      editText('ed_roleFocus','تمرکز اختصاصی نقش',d.roleFocus||'')+
      editText('ed_specificResponsibilities','مسئولیت‌های اختصاصی',arrToLines(d.specificResponsibilities),true,false,'هر مورد در یک خط')+
      editText('ed_processes','فرآیندها / وظایف اصلی',rowsToTsv(p.processes,['process','responsibilityType']),true,true,'فرمت TSV: process و responsibilityType')+
      editText('ed_baseline','پروفایل مبنای ارزش‌یابی',rowsToTsv(p.baselineEvaluationProfile,['factor','baseline']),true,true,'فرمت TSV: factor و baseline')+
      editText('ed_education','تحصیلات',r.education||'')+
      editText('ed_experience','تجربه',r.experience||'')+
      editText('ed_knowledge','دانش تخصصی',arrToLines(r.knowledge),true,false,'هر مورد در یک خط')+
      editText('ed_competencies','شایستگی‌های کلیدی',arrToLines(r.competencies),true,false,'هر مورد در یک خط')+
      `</div>`;
  }
  html+=`<div class="actions"><button onclick="saveEditor()">ذخیره در دیتابیس</button><button class="secondary" onclick="closeEditor()">بستن</button><button class="secondary" onclick="downloadDb()">دانلود دیتابیس فعلی</button></div>`;
  e.innerHTML=html; e.classList.add('active'); e.scrollIntoView({behavior:'smooth',block:'start'});
}
function closeEditor(){ document.getElementById('editor').classList.remove('active'); }
function val(id){ return document.getElementById(id)?.value || ''; }
function saveEditor(){
  if(!currentProfile) return;
  const p=structuredClone(currentProfile);
  try{
    if(p.type==='subfamily'){
      p.subFamilyFa=val('ed_subFamilyFa'); p.subFamilyEn=val('ed_subFamilyEn');
      p.baseInfo=kvLinesToObj(val('ed_baseInfo'));
      p.commonComponents={purpose:val('ed_purpose'), mission:val('ed_mission'), keyResponsibilities:linesToArr(val('ed_keyResponsibilities')), expectedOutputs:linesToArr(val('ed_expectedOutputs')), stakeholders:linesToArr(val('ed_stakeholders')), baseKnowledgeSkills:linesToArr(val('ed_baseKnowledgeSkills'))};
      p.processMatrix=tsvToMatrix(val('ed_processMatrix'),'process');
      p.evaluationProfile=tsvToMatrix(val('ed_evaluationProfile'),'factor');
      p.careerPath=val('ed_careerPath');
    } else {
      p.jobTitle=val('ed_jobTitle'); p.level=val('ed_level');
      p.baseInfo=kvLinesToObj(val('ed_baseInfo'));
      p.relationToSubFamily=val('ed_relation');
      p.distinctiveComponents={roleFocus:val('ed_roleFocus'), specificResponsibilities:linesToArr(val('ed_specificResponsibilities'))};
      p.processes=tsvToRows(val('ed_processes'),['process','responsibilityType']);
      p.baselineEvaluationProfile=tsvToRows(val('ed_baseline'),['factor','baseline']);
      p.requirements={education:val('ed_education'), experience:val('ed_experience'), knowledge:linesToArr(val('ed_knowledge')), competencies:linesToArr(val('ed_competencies'))};
    }
    p.updatedAt=new Date().toISOString();
    const idx=(db.profiles||[]).findIndex(x=>x.id===currentProfile.id);
    if(idx>=0) db.profiles[idx]=p; else db.profiles.push(p);
    db.updatedAt=new Date().toISOString().slice(0,10);
    currentProfile=p; saveDb(); refreshSelect(); document.getElementById('profileSelect').value=p.id; renderProfile(p); openEditor(); setStatus('تغییرات در دیتابیس مرورگر ذخیره شد. برای ذخیره در فایل، دکمه ذخیره فایل JSON را بزنید.');
  } catch(e){ setStatus('خطا در ذخیره: '+e.message,true); }
}
async function saveDbToFile(){
  const text=JSON.stringify(db,null,2);
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({suggestedName:'dotin_job_profiles_db.json',types:[{description:'JSON Database',accept:{'application/json':['.json']}}]});
      const writable=await handle.createWritable(); await writable.write(text); await writable.close(); setStatus('فایل JSON ذخیره شد.'); return;
    }catch(e){ if(e.name==='AbortError') return; }
  }
  downloadDb(); setStatus('به دلیل محدودیت مرورگر، فایل JSON دانلود شد.');
}

function downloadCurrentHtml(){ if(!currentProfile) return; const html='<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><title>'+escapeHtml(profileLabel(currentProfile))+'</title><style>'+document.querySelector('style').textContent+'</style></head><body><main><section class="doc">'+document.getElementById('doc').innerHTML+'</section></main></body></html>'; download((currentProfile.id||'profile')+'.html', html, 'text/html'); }

refreshSelect();
