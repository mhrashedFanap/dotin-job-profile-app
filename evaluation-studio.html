async function supabaseRequest(method,path,body){
  const c=dbConfig();
  const base=String(c.url||'').replace(/\/+$/,'');
  const res=await fetch(`${base}/rest/v1/${path}`,{
    method,
    headers:{
      apikey:c.anonKey,
      authorization:`Bearer ${c.anonKey}`,
      'content-type':'application/json',
      prefer:'return=representation,resolution=merge-duplicates'
    },
    body:body===undefined?undefined:JSON.stringify(body)
  });
  if(!res.ok) throw new Error((await res.text())||res.statusText);
  if(res.status===204) return null;
  const text=await res.text();
  return text?JSON.parse(text):null;
}
async function loadStateFromDatabase(){
  if(!dbEnabled()) throw new Error('Supabase is not configured.');
  dbStatus='Loading from database...';
  const rows=await supabaseRequest('GET',`${DB_TABLE}?id=eq.${encodeURIComponent(dbRecordId())}&select=id,data,updated_at`);
  if(rows&&rows[0]&&rows[0].data){
    state=normalizeImportedData(rows[0].data);
    localStorage.setItem(LS_KEY,JSON.stringify(state));
    dbStatus='Database loaded';
    render(activeView());
    return true;
  }
  dbStatus='No database row yet';
  return false;
}
async function pushStateToDatabase(showAlert=true){
  if(!dbEnabled()) return false;
  try{
    await supabaseRequest('POST',`${DB_TABLE}?on_conflict=id`,{id:dbRecordId(),data:state,updated_at:new Date().toISOString()});
    dbStatus='Database synced';
    if(showAlert) alert('Database sync completed.');
    return true;
  }catch(err){
    dbStatus='Database sync failed: '+err.message;
    if(showAlert) alert(dbStatus);
    return false;
  }
}

function roundHalf(x){return Math.round(x*2)/2}
function interp(table,x,y){if(x===''||y===''||x==null||y==null)return ''; x=Number(x);y=Number(y); const x1=Math.max(1,Math.floor(x)), x2=Math.min(table.length,Math.ceil(x)); const y1=Math.max(1,Math.floor(y)), y2=Math.min(table[0].length,Math.ceil(y)); const v11=table[x1-1][y1-1],v12=table[x1-1][y2-1],v21=table[x2-1][y1-1],v22=table[x2-1][y2-1]; if(x1===x2&&y1===y2)return v11; if(x1===x2)return v11+(y-y1)*(v12-v11)/(y2-y1); if(y1===y2)return v11+(x-x1)*(v21-v11)/(x2-x1); return v11+(x-x1)*(v21-v11)/(x2-x1)+(y-y1)*(v12-v11)/(y2-y1)+(x-x1)*(y-y1)*(v22-v21-v12+v11)/((x2-x1)*(y2-y1));}
function scoreSub(job, sub){const qs=state.questions.filter(q=>q.sub===sub); let sw=0,ss=0,vals=[]; for(const q of qs){const ans=job.answers[q.id]; const opt=q.options.find(o=>o[0]===ans); if(opt){sw+=Number(q.weight||0); ss+=Number(opt[1])*Number(q.weight||0); vals.push(Number(opt[1]));}} if(!sw)return {raw:'',degree:'',confidence:''}; const raw=ss/sw, degree=state.settings.halfStep?roundHalf(raw):Math.round(raw); let conf=''; if(vals.length>1){const max=Math.max(...vals), min=Math.min(...vals); const subMax=Math.max(...qs.flatMap(q=>q.options.map(o=>Number(o[1])))); conf=Math.max(0,1-(max-min)/Math.max(1,subMax-1));} return {raw,degree,confidence:conf};}
function label(sub,deg){if(deg===''||deg==null)return ''; const k=Math.max(1,Math.min(99,Math.round(Number(deg)))); return (subfactorLabels[sub]&&subfactorLabels[sub][k])||''}

function baselineOptionLabel(sub,deg){
  deg=Number(deg); if(!isFinite(deg)) return '';
  const labels=subfactorLabels[sub]||{};
  if(Math.abs(deg-Math.round(deg))<0.001) return (labels[Math.round(deg)]||('Degree '+deg));
  const low=Math.floor(deg), high=Math.ceil(deg);
  const l1=labels[low]||low, l2=labels[high]||high;
  return `${l1}+ / ${l2}-`;
}

function calc(job){const s={}; ['Impact Nature','Contribution','Communication','Frame','Innovation','Complexity','Knowledge','Teams','Breadth'].forEach(sub=>s[sub]=scoreSub(job,sub)); const impactDegree=(s['Impact Nature'].degree&&s['Contribution'].degree)?3*(s['Impact Nature'].degree-1)+s['Contribution'].degree:''; const impact=impactDegree?interp(impactPoints,impactDegree,Number(job.size||10)):''; const communication=interp(commPoints,s['Communication'].degree,s['Frame'].degree); const innovation=interp(innovPoints,s['Innovation'].degree,s['Complexity'].degree); const kb=(s['Teams'].degree&&s['Breadth'].degree)?((s['Teams'].degree-1)*3+s['Breadth'].degree):''; const knowledge=interp(knowPoints,s['Knowledge'].degree,kb); const riskMap={Normal:0,Mental:1,Injury:2,Disability:3}; const expMap={Low:1,Medium:2,High:3}; const rd=riskMap[job.riskType||'Normal']??0, ed=expMap[job.riskExposure||'Low']??1; const risk=rd===0?0:riskPoints[rd][ed-1]; const total=[impact,communication,innovation,knowledge,risk].some(v=>v==='')?'':Math.round((impact+communication+innovation+knowledge+risk)*10)/10; const pc=total===''?'':(total<26?'Below PC40':39+Math.ceil((total-25)/25)); return {s,impactDegree,points:{impact,communication,innovation,knowledge,risk,total,pc}}}

function managerDegrees(job){const c=calc(job); const d={}; alignmentFactors.forEach(f=>d[f.key]=c.s[f.key].degree); return d}
function gapClass(diff){if(diff===''||isNaN(diff))return 'muted'; if(diff<=0.5)return 'align-ok'; if(diff<=1)return 'align-mid'; return 'align-bad'}
function gapLabel(diff){if(diff===''||isNaN(diff))return 'نامشخص'; if(diff<=0.5)return 'منطبق'; if(diff<=1)return 'نیازمند بازبینی سبک'; return 'نیازمند کالیبراسیون'}
function alignmentSummary(job){const base=ensureBaseline(job), mgr=managerDegrees(job); let diffs=[]; alignmentFactors.forEach(f=>{const m=Number(mgr[f.key]), b=Number(base[f.key]); if(isFinite(m)&&isFinite(b)) diffs.push(Math.abs(m-b));}); const avg=diffs.length?diffs.reduce((a,b)=>a+b,0)/diffs.length:''; return {avg, status: avg===''?'نامشخص':gapLabel(avg), cls:avg===''?'muted':gapClass(avg), answered:Object.keys(job.answers||{}).length}}
function alignmentLineSvg(job){const base=ensureBaseline(job), mgr=managerDegrees(job); const W=940,H=330,ml=52,mr=24,mt=30,mb=70; const maxY=8; const plotW=W-ml-mr, plotH=H-mt-mb; const x=i=>ml+(plotW*(i/(alignmentFactors.length-1))); const y=v=>mt+plotH-(Number(v||0)/maxY)*plotH; const pts=(obj)=>alignmentFactors.map((f,i)=>{const v=obj[f.key]; return (v===''||v==null||isNaN(Number(v)))?null:[x(i),y(v)]}); const polyline=(points,color,dash='')=>{let segs=[],curr=[]; points.forEach(p=>{if(p)curr.push(p); else if(curr.length){segs.push(curr);curr=[]}}); if(curr.length)segs.push(curr); return segs.map(s=>`<polyline points="${s.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" ${dash?`stroke-dasharray="${dash}"`:''}/>`).join('')}; const basePts=pts(base), mgrPts=pts(mgr); const grid=[1,2,3,4,5,6,7,8].map(t=>`<line x1="${ml}" y1="${y(t)}" x2="${W-mr}" y2="${y(t)}" stroke="#e6eaf0"/><text x="${ml-12}" y="${y(t)+4}" text-anchor="end" font-size="11" fill="#667085">${t}</text>`).join(''); const labels=alignmentFactors.map((f,i)=>`<text x="${x(i)}" y="${H-34}" text-anchor="middle" font-size="11" fill="#344054">${f.label}</text>`).join(''); const circles=(points,color)=>points.map((p,i)=>p?`<circle cx="${p[0]}" cy="${p[1]}" r="4.5" fill="${color}"><title>${alignmentFactors[i].label}: ${alignmentFactors[i].key}</title></circle>`:'').join(''); return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="360" role="img" aria-label="نمودار انطباق پروفایل شغل"><rect x="0" y="0" width="${W}" height="${H}" fill="white"/>${grid}<line x1="${ml}" y1="${mt}" x2="${ml}" y2="${H-mb}" stroke="#cfd7e2"/><line x1="${ml}" y1="${H-mb}" x2="${W-mr}" y2="${H-mb}" stroke="#cfd7e2"/>${labels}${polyline(basePts,'#1f4e79','6 4')}${polyline(mgrPts,'#138a5e')}${circles(basePts,'#1f4e79')}${circles(mgrPts,'#138a5e')}</svg>`}
function renderAlignment(){const job=currentJob(); if(!job){document.getElementById('alignment').innerHTML='<div class="card">ابتدا یک شغل اضافه کنید.</div>';return} const c=calc(job), base=ensureBaseline(job), mgr=managerDegrees(job), sum=alignmentSummary(job); const rows=alignmentFactors.map(f=>{const b=Number(base[f.key]); const m=mgr[f.key]; const diff=(m===''||m==null||isNaN(Number(m)))?'':Math.abs(Number(m)-b); return `<tr><td>${esc(f.label)}</td><td>${esc(baselineOptionLabel(f.key,b))}<div class="degree-note ltr">${b}</div></td><td>${m===''?'-':esc(label(f.key,m))}<div class="degree-note ltr">${m===''?'':m}</div></td><td class="ltr ${gapClass(diff)}">${diff===''?'-':diff.toFixed(1)}</td><td class="${gapClass(diff)}">${gapLabel(diff)}</td></tr>`}).join(''); const editRows=alignmentFactors.map(f=>`<div><label>${esc(f.label)} / ${esc(f.key)}</label>${baselineSelect(job,f)}</div>`).join(''); document.getElementById('alignment').innerHTML=`<div class="card"><div class="grid g3"><div><label>انتخاب شغل</label>${jobSelector()}</div><div class="metric"><div class="name">IPE مدیر</div><div class="val">${c.points.total||'-'}</div></div><div class="metric"><div class="name">PC مدیر</div><div class="val">${c.points.pc||'-'}</div></div></div></div><div class="card"><h2>Job Profile Alignment</h2><p class="hint">مقایسه پروفایل شناسنامه‌ای شغل با ارزیابی مدیر بر اساس Degree هر مولفه. تمرکز این نمودار روی شکل پروفایل است، نه روی اختلاف‌های ریز عددی.</p><div class="scorebox"><div class="metric"><div class="name">میانگین اختلاف Degree</div><div class="val ${sum.cls}">${sum.avg===''?'-':sum.avg.toFixed(1)}</div></div><div class="metric"><div class="name">وضعیت کلی</div><div class="val ${sum.cls}" style="font-size:18px">${sum.status}</div></div><div class="metric"><div class="name">پاسخ‌ها</div><div class="val">${sum.answered}/${state.questions.length}</div></div><div class="metric"><div class="name">نمایش</div><div class="val" style="font-size:18px">Baseline × Manager</div></div></div><div class="chart-wrap" style="margin-top:14px">${alignmentLineSvg(job)}<div class="legend"><span><i class="line-base"></i>شناسنامه مرجع</span><span><i class="line-manager"></i>ارزیابی مدیر</span></div></div></div><div class="card"><h2>جدول اختلاف مولفه‌ها</h2><div class="scroll"><table><thead><tr><th>مولفه</th><th>شناسنامه</th><th>مدیر</th><th>اختلاف</th><th>وضعیت</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="card"><h2>ثبت/ویرایش پروفایل شناسنامه‌ای همین شغل</h2><p class="hint">این مقادیر همان Baseline شناسنامه اصلی هستند. بعداً می‌توانیم برای هر شغل از شناسنامه‌های رسمی وارد کنیم.</p><div class="grid g3 baseline-grid">${editRows}</div><div class="btns" style="margin-top:12px"><button class="btn secondary" id="resetBaseline">بازگشت به الگوی پیش‌فرض</button></div></div>`; document.querySelector('#alignment #jobSel').onchange=e=>{state.selectedJobId=e.target.value;save();renderAlignment()}; document.querySelectorAll('#alignment select[data-base]').forEach(sel=>sel.onchange=e=>{job.baseline=job.baseline||{};job.baseline[e.target.dataset.base]=Number(e.target.value);save();renderAlignment()}); document.getElementById('resetBaseline').onclick=()=>{job.baseline=defaultBaseline();save();renderAlignment()}}

function normalizeImportedData(data){
  if(!data || typeof data!=='object') throw new Error('ساختار داده معتبر نیست.');
  const base=defaultState();
  data.jobs=Array.isArray(data.jobs)?data.jobs:base.jobs;
  data.questions=Array.isArray(data.questions)?data.questions:base.questions;
  data.settings=data.settings||base.settings;
  data.jobs=data.jobs.map(j=>({
    id:j.id||uid(),
    title:j.title||'شغل بدون عنوان',
    family:j.family||'',
    subfamily:j.subfamily||'',
    stream:j.stream||'تخصصی',
    levelCode:j.levelCode||inferLevelCode(j.level,j.stream||'تخصصی'),

function parseCsvText(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], nx=text[i+1];
    if(ch==='"'){
      if(q && nx==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(ch===',' && !q){row.push(cur.trim()); cur='';}
    else if((ch==='\n'||ch==='\r') && !q){
      if(ch==='\r' && nx==='\n') i++;
      row.push(cur.trim()); cur='';
      if(row.some(x=>String(x).trim()!=='')) rows.push(row);
      row=[];
    }else cur+=ch;
  }
  row.push(cur.trim()); if(row.some(x=>String(x).trim()!=='')) rows.push(row);
  return rows;
}
function rowsToObjects(rows){
  if(!rows||rows.length<2)return [];
  const headers=rows[0].map(h=>String(h||'').trim());
  return rows.slice(1).map(r=>{const o={}; headers.forEach((h,i)=>o[h]=r[i]??''); return o;});
}
function excelXmlRows(text){
  const doc=new DOMParser().parseFromString(text,'text/xml');
  const err=doc.querySelector('parsererror'); if(err) throw new Error('ساختار XML/Excel قابل خواندن نیست.');
  const rows=[...doc.getElementsByTagName('Row')];
  return rows.map(row=>[...row.getElementsByTagName('Cell')].map(c=>{const d=c.getElementsByTagName('Data')[0]; return d?d.textContent:''})).filter(r=>r.some(x=>String(x).trim()!==''));
}
function normHeader(h){return String(h||'').toLowerCase().replace(/[\s_\-\/\.]/g,'').replace(/ي/g,'ی').replace(/ك/g,'ک')}
function pick(row, names){
  const keys=Object.keys(row||{}); const wanted=names.map(normHeader);
  for(const k of keys){ if(wanted.includes(normHeader(k))) return row[k]; }
  return '';
}
function numVal(x){const n=Number(String(x??'').replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/,/g,'.')); return isFinite(n)?n:'';}
function defaultJobFromRow(row, i){

  const baselineMap={

function buildStateFromRows(rows){
  const objs=rowsToObjects(rows); if(!objs.length) throw new Error('در فایل ردیف داده قابل استفاده پیدا نشد.');

}
function detectFileData(fileName, text){
  const name=String(fileName||'').toLowerCase();
  if(name.endsWith('.xlsx')) throw new Error('فایل XLSX در نسخه HTML آفلاین مستقیم خوانده نمی‌شود. لطفاً آن را از Excel به CSV یا Excel 2003 XML / XLS خروجی بگیرید، یا JSON خروجی همین ابزار را بارگذاری کنید.');
  let parsed=null, kind='';
  const trimmed=String(text||'').trim();
  if(trimmed.startsWith('{')||trimmed.startsWith('[')){
    const js=JSON.parse(trimmed);
    if(Array.isArray(js)){ parsed=buildStateFromRows([Object.keys(js[0]||{})].concat(js.map(o=>Object.keys(js[0]||{}).map(k=>o[k])))); kind='JSON جدولی'; }
    else { parsed=normalizeImportedData(js); kind='JSON ساختاریافته'; }
  }else if(trimmed.startsWith('<?xml')||trimmed.includes('<Workbook')||trimmed.includes('<Worksheet')){
    parsed=buildStateFromRows(excelXmlRows(trimmed)); kind='Excel XML / XLS';
  }else{
    parsed=buildStateFromRows(parseCsvText(trimmed)); kind='CSV';
  }
  return {kind, data:parsed, jobs:parsed.jobs?.length||0, questions:parsed.questions?.length||0};
}
function mergeImportedState(imported, mode){

  let added=0, updated=0;
  const byTitle=new Map(state.jobs.map(j=>[String(j.title||'').trim().toLowerCase(),j]));
  (imported.jobs||[]).forEach(nj=>{
    const key=String(nj.title||'').trim().toLowerCase(); const ex=byTitle.get(key);
    if(ex){ Object.assign(ex,{family:nj.family||ex.family,subfamily:nj.subfamily||ex.subfamily,stream:nj.stream||ex.stream,levelCode:nj.levelCode||ex.levelCode,level:nj.level||ex.level,size:nj.size||ex.size,riskType:nj.riskType||ex.riskType,riskExposure:nj.riskExposure||ex.riskExposure,baseline:{...ex.baseline,...nj.baseline},answers:{...ex.answers,...nj.answers},evidence:{...ex.evidence,...nj.evidence}}); updated++; }
    else { state.jobs.push({...nj,id:nj.id||uid()}); added++; }
  });
  if(imported.questions?.length && confirm('سؤال‌های فایل بارگذاری‌شده هم جایگزین سؤال‌های فعلی شود؟')) state.questions=imported.questions;
  if(!state.selectedJobId && state.jobs[0]) state.selectedJobId=state.jobs[0].id;
  save(); return {added,updated,mode:'ادغام با داده‌های فعلی'};
}

function exportExcel(){const now=new Date().toISOString().slice(0,10); const overview=[['Title','Family','SubFamily','Stream','Level Code','Level Title','Company Size','Risk Type','Risk Exposure','IPE','PC','Impact Degree','Impact Nature','Contribution','Communication','Frame','Innovation','Complexity','Knowledge','Teams','Breadth','Answered']].concat(state.jobs.map(j=>{const c=calc(j); return [j.title,j.family||'',j.subfamily||'',j.stream||'',j.levelCode||'',jobLevelTitle(j),j.size||'',j.riskType||'',j.riskExposure||'',c.points.total||'',c.points.pc||'',c.impactDegree?Number(c.impactDegree).toFixed(1):'',c.s['Impact Nature'].degree||'',c.s['Contribution'].degree||'',c.s['Communication'].degree||'',c.s['Frame'].degree||'',c.s['Innovation'].degree||'',c.s['Complexity'].degree||'',c.s['Knowledge'].degree||'',c.s['Teams'].degree||'',c.s['Breadth'].degree||'',Object.keys(j.answers||{}).length+'/'+state.questions.length]})); const results=[['Job','Mercer Component','Degree/Key','Mercer Level','Raw/Point','Confidence']].concat(state.jobs.flatMap(factorRowsForJob)); const answers=[['Job','Q','Section','SubFactor','Question','Answer','Score','Weight','Mercer Equivalent','Evidence']].concat(state.jobs.flatMap(j=>state.questions.map(q=>{const ans=j.answers?.[q.id]||''; const opt=q.options.find(o=>o[0]===ans); return [j.title,q.id,q.section,q.sub,q.text,ans,opt?opt[1]:'',q.weight||'',opt?label(q.sub,opt[1]):'',j.evidence?.[q.id]||'']}))); const dictionary=[['Q','Section','SubFactor','Weight','Question','Option','Score','Mercer Equivalent']].concat(state.questions.flatMap(q=>q.options.map(o=>[q.id,q.section,q.sub,q.weight||'',q.text,o[0],o[1],label(q.sub,o[1])]))); const jobs=[['ID','Title','Family','SubFamily','Stream','Level Code','Level Title','Company Size','Risk Type','Risk Exposure']].concat(state.jobs.map(j=>[j.id,j.title,j.family||'',j.subfamily||'',j.stream||'',j.levelCode||'',jobLevelTitle(j),j.size||'',j.riskType||'',j.riskExposure||''])); const alignment=[['Job','Factor','Baseline Degree','Manager Degree','Gap','Status']].concat(state.jobs.flatMap(j=>{const base=ensureBaseline(j), mgr=managerDegrees(j); return alignmentFactors.map(f=>{const b=Number(base[f.key]), m=mgr[f.key], g=(m===''||m==null||isNaN(Number(m)))?'':Math.abs(Number(m)-b); return [j.title,f.label,b,m===''?'':m,g===''?'':Number(g.toFixed(1)),gapLabel(g)]})})); const workbook=`<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet" xmlns:html="http://www.w3.org/TR/REC-html40"><Styles><Style ss:ID="Default" ss:Name="Normal"><Alignment ss:Vertical="Top" ss:WrapText="1"/><Font ss:FontName="Tahoma" ss:Size="10"/></Style></Styles>${sheetXml('Overview',overview)}${sheetXml('Results',results)}${sheetXml('Answers',answers)}${sheetXml('Dictionary',dictionary)}${sheetXml('Job Library',jobs)}${sheetXml('Alignment',alignment)}</Workbook>`; download(`dotin_job_evaluation_export_${now}.xls`,workbook,'application/vnd.ms-excel;charset=utf-8')}
function csv(x){x=String(x??'');return /[",\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x} function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
